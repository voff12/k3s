# ===========================
# Spring Cloud Bootstrap – Nacos Config Center
# 此文件在 application.properties 之前加载，用于连接 Nacos 配置中心
# ===========================

spring.application.name=k3s-demo

# Nacos Config Server 地址
# 在 k3s 中部署时，替换为 Nacos Service 的 ClusterIP 或 NodePort 地址
# 例如: nacos-svc.default.svc.cluster.local:8848
# 也可通过环境变量 NACOS_SERVER_ADDR 覆盖
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}

# Nacos 命名空间（留空表示使用 public 命名空间）
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:}

# Nacos 配置分组（默认 DEFAULT_GROUP）
spring.cloud.nacos.config.group=${NACOS_GROUP:DEFAULT_GROUP}

# Data ID 格式: ${spring.application.name}.properties
# 即 Nacos 中需要创建名为 k3s-demo.properties 的配置，内容包含:
#   qwen.api.key=sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.cloud.nacos.config.file-extension=properties

# 启用动态刷新：Nacos 配置更新后，@RefreshScope Bean 自动重载
spring.cloud.nacos.config.refresh-enabled=true
